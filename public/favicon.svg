<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#0e1628"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f5"/>
      <stop offset="100%" stop-color="#c8d3e8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 왼쪽 브래킷 [ -->
  <rect x="10" y="14" width="4" height="36" rx="2" fill="url(#bracket)"/>
  <rect x="10" y="14" width="12" height="4" rx="2" fill="url(#bracket)"/>
  <rect x="10" y="46" width="12" height="4" rx="2" fill="url(#bracket)"/>

  <!-- 오른쪽 브래킷 ] -->
  <rect x="50" y="14" width="4" height="36" rx="2" fill="url(#bracket)"/>
  <rect x="42" y="14" width="12" height="4" rx="2" fill="url(#bracket)"/>
  <rect x="42" y="46" width="12" height="4" rx="2" fill="url(#bracket)"/>

  <!-- 중앙 D 텍스트 -->
  <text
    x="32" y="42"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="22"
    font-weight="900"
    fill="url(#text)"
    letter-spacing="-1"
  >D</text>
</svg>
